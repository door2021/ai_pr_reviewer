version: '3.8'

services:
  mysql:
    image: mysql:8.0
    environment:
      MYSQL_ALLOW_EMPTY_PASSWORD: "yes"
      # MYSQL_ROOT_PASSWORD: password
      MYSQL_DATABASE: ai_pr
    ports:
      - "3306:3306"
    volumes:
      - mysql_data: /var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      timeout: 20s
      retries: 10

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data: /data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      timeout: 5s
      retries: 5

  backend:
    build: ./backend
    ports:
      - "8000:8000"
    env_file:
      - .env  
    environment:
      - DATABASE_URL=mysql+pymysql://root:@mysql:3306/ai_pr
      - REDIS_URL=redis://redis:6379
      - SECRET_KEY=${SECRET_KEY}
      - HF_TOKEN=${HF_TOKEN}
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./backend:/app

volumes:
  mysql_data:
  redis_data: